<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do list</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main class="head">
        <h1>To do list</h1>
    </main>
       <section>

        <!-- WORK SECTION -->
        <div class="work">
            <h3>WORK</h3>
            <!-- Changed id from "workTask" to "task" -->
            <input type="text" id="task" placeholder="New task">
            <!-- Changed id from "workDueDate" to "dueDate" -->
            <input type="date" id="dueDate">
            <button id="addTask">Add</button>
            <ol id="taskList"></ol>
        </div>

        <!-- HOME SECTION -->
        <div>
            <h3>HOME</h3>
            <input type="text" id="homeTask" placeholder="New task">
            <!-- Removed the misplaced "dueDate" id from here -->
            <button id="homebtn">Add</button>
            <ol id="homeList"></ol>
        </div>

    </section>

    <script src="main.js"></script>
</body>


</html>
