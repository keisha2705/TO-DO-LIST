<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do list</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main class="head">
        <h1>To do list</h1>
    </main>
    <section>


        <div class="work">

            <h3>WORK</h3>

            <input type="text" id="task" placeholder="New task">

            <input type="date" id="dueDate">

            <button id="addTask">Add</button>

            <ol id="taskList"></ol>

        </div>

     
        <div>

            <h3>HOME</h3>

            <input type="text" id="homeTask" placeholder="New task">
            <input type="date" id="dueDate">
            <button id="homebtn">Add</button>

            <ol id="homeList"></ol>

        </div>

    </section>
    <script src="main.js"></script>
</body>


</html>
